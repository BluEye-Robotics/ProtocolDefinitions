name: Compile TypeScript Protobuf Definitions

on:
  push:
    branches:
      - master

permissions:
  id-token: write # Required for OIDC
  contents: read

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          pnpm install

      - name: Generate
        run: |
          mkdir -p ./out/ &&
          protoc protobuf_definitions/*.proto \
            --plugin=./node_modules/.bin/protoc-gen-ts_proto \
            --proto_path=protobuf_definitions \
            --ts_proto_out=./out \
            --ts_proto_opt=outputIndex=true \
            --ts_proto_opt=globalThisPolyfill=true \
            --ts_proto_opt=useExactTypes=false

      - name: Compile
        run: pnpm run build

      - name: Publish to npm
        run: |
          cp README.npm.md README.md
          VERSION=$(pnpm pkg get version | tr -d '"')
          SHORT_SHA=${GITHUB_SHA::8}
          pnpm version --no-git-tag-version "${VERSION}-${SHORT_SHA}"
          pnpm publish --no-git-checks --access public --tag latest
